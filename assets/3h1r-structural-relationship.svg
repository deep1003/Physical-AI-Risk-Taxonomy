<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc" font-family="Helvetica, Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="title">3H1R structural relationship for Physical AI risk review</title>
  <desc id="desc">Harmless on the left and Helpful on the right are in tension. Honest mediates the two, and Role Consistency stabilizes all three across contexts. Monochrome schematic, centered node text.</desc>
  <defs>
    <marker id="ah-solid" markerWidth="10" markerHeight="10" refX="6.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.2 L0,6.4 z" fill="#1f1f1f"/>
    </marker>
    <marker id="ah-solid-start" markerWidth="10" markerHeight="10" refX="6.5" refY="3.2" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.2 L0,6.4 z" fill="#1f1f1f"/>
    </marker>
    <marker id="ah-dash" markerWidth="10" markerHeight="10" refX="6.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.2 L0,6.4 z" fill="#6b6b6b"/>
    </marker>
  </defs>

  <rect width="1040" height="600" fill="#ffffff"/>
  <rect x="20" y="20" width="1000" height="560" rx="8" fill="#ffffff" stroke="#dcdcdc" stroke-width="1"/>

  <text x="52" y="58" font-size="22" font-weight="700" fill="#141414">3H1R 구조적 관계</text>
  <text x="52" y="84" font-size="13" fill="#6b6b6b">Physical AI 리스크 카드의 Primary / Secondary 정렬 구조 — 무해성(좌) ↔ 유용성(우)</text>
  <line x1="52" y1="100" x2="988" y2="100" stroke="#ededed" stroke-width="1"/>

  <!-- ===== H1 Harmless (LEFT) ===== -->
  <rect x="60" y="150" width="300" height="120" rx="10" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.6"/>
  <rect x="195" y="166" width="30" height="18" rx="4" fill="#111111"/>
  <text x="210" y="179" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">H1</text>
  <text x="210" y="208" text-anchor="middle" font-size="16" font-weight="700" fill="#141414">Harmless · 무해성</text>
  <text x="210" y="234" text-anchor="middle" font-size="12.5" fill="#555555">의도적·비의도적</text>
  <text x="210" y="254" text-anchor="middle" font-size="12.5" fill="#555555">물리적 위해의 예방 및 완화</text>

  <!-- ===== H2 Helpful (RIGHT) ===== -->
  <rect x="680" y="150" width="300" height="120" rx="10" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.6"/>
  <rect x="815" y="166" width="30" height="18" rx="4" fill="#444444"/>
  <text x="830" y="179" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">H2</text>
  <text x="830" y="208" text-anchor="middle" font-size="16" font-weight="700" fill="#141414">Helpful · 유용성</text>
  <text x="830" y="234" text-anchor="middle" font-size="12.5" fill="#555555">사용자 의도·맥락에 부합하는</text>
  <text x="830" y="254" text-anchor="middle" font-size="12.5" fill="#555555">과업의 안전한 수행</text>

  <!-- tension link -->
  <line x1="368" y1="210" x2="672" y2="210" stroke="#1f1f1f" stroke-width="1.8" marker-start="url(#ah-solid-start)" marker-end="url(#ah-solid)"/>
  <rect x="464" y="192" width="112" height="34" rx="6" fill="#ffffff" stroke="#bdbdbd" stroke-width="1"/>
  <text x="520" y="214" text-anchor="middle" font-size="13" font-weight="700" fill="#222222">긴장 · tradeoff</text>

  <!-- ===== H3 Honest (CENTER, mediator) ===== -->
  <rect x="370" y="300" width="300" height="120" rx="10" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.6"/>
  <rect x="505" y="316" width="30" height="18" rx="4" fill="#333333"/>
  <text x="520" y="329" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">H3</text>
  <text x="520" y="358" text-anchor="middle" font-size="16" font-weight="700" fill="#141414">Honest · 정직성</text>
  <text x="520" y="384" text-anchor="middle" font-size="12.5" fill="#555555">정확한 상황 인식과</text>
  <text x="520" y="404" text-anchor="middle" font-size="12.5" fill="#555555">불확실성의 전달</text>

  <!-- Honest mediates both (arcs) -->
  <path d="M430 300 C360 287 280 280 232 272" fill="none" stroke="#1f1f1f" stroke-width="1.8" marker-end="url(#ah-solid)"/>
  <path d="M610 300 C680 287 760 280 808 272" fill="none" stroke="#1f1f1f" stroke-width="1.8" marker-end="url(#ah-solid)"/>
  <!-- mediates labels: placed below the arrows, outside all node boxes -->
  <rect x="248" y="332" width="104" height="20" rx="5" fill="#ffffff"/>
  <text x="300" y="346" text-anchor="middle" font-size="10.5" fill="#3a3a3a">중재 · mediates</text>
  <rect x="688" y="332" width="104" height="20" rx="5" fill="#ffffff"/>
  <text x="740" y="346" text-anchor="middle" font-size="10.5" fill="#3a3a3a">중재 · mediates</text>

  <!-- ===== RC Role Consistency (BASE, stabilizer) ===== -->
  <rect x="350" y="452" width="340" height="104" rx="10" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.6"/>
  <rect x="505" y="468" width="30" height="18" rx="4" fill="#222222"/>
  <text x="520" y="481" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">RC</text>
  <text x="520" y="510" text-anchor="middle" font-size="16" font-weight="700" fill="#141414">Role Consistency · 역할 일관성</text>
  <text x="520" y="536" text-anchor="middle" font-size="12.5" fill="#555555">맥락 변화에도 역할·안전 원칙의 일관된 유지</text>

  <!-- RC -> Honest (solid) -->
  <line x1="520" y1="452" x2="520" y2="424" stroke="#1f1f1f" stroke-width="1.8" marker-end="url(#ah-solid)"/>
  <!-- stabilizes label: shifted to the RIGHT of the vertical arrow -->
  <rect x="540" y="426" width="128" height="24" rx="6" fill="#ffffff"/>
  <text x="604" y="443" text-anchor="middle" font-size="11.5" fill="#3a3a3a">안정화 · stabilizes</text>

  <!-- RC -> Harmless / Helpful (dashed, stabilize) -->
  <path d="M404 474 C250 458 150 360 180 274" fill="none" stroke="#6b6b6b" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#ah-dash)"/>
  <path d="M636 474 C790 458 890 360 860 274" fill="none" stroke="#6b6b6b" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#ah-dash)"/>
</svg>
