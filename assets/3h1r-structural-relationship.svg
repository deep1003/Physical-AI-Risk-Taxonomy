<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc" font-family="Helvetica, Arial, 'Segoe UI', sans-serif">
  <title id="title">3H1R structural relationship for Physical AI risk review</title>
  <desc id="desc">Harmless on the left and Helpful on the right are in tension. Honest mediates the two, and Role Consistency stabilizes all three across contexts.</desc>
  <defs>
    <marker id="ah-tension" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 z" fill="#475467"/>
    </marker>
    <marker id="ah-mediate" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 z" fill="#2c6cb0"/>
    </marker>
    <marker id="ah-stabilize" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 z" fill="#6c4aa3"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="#ffffff"/>
  <rect x="24" y="24" width="912" height="492" rx="6" fill="#ffffff" stroke="#d7dce5" stroke-width="1"/>

  <text x="56" y="64" font-size="20" font-weight="600" fill="#1b2733">3H1R 구조적 관계</text>
  <text x="56" y="88" font-size="13" fill="#667085">Physical AI 리스크 카드의 Primary / Secondary 정렬 구조 · Harmless(좌) ↔ Helpful(우)</text>
  <line x1="56" y1="104" x2="904" y2="104" stroke="#eceff4" stroke-width="1"/>

  <!-- H1 Harmless (LEFT) -->
  <rect x="74" y="158" width="244" height="88" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="196" y="196" text-anchor="middle" font-size="19" font-weight="700" fill="#922b21">H1 Harmless</text>
  <text x="196" y="222" text-anchor="middle" font-size="12" fill="#475467">물리적 위해의 예방·완화</text>

  <!-- H2 Helpful (RIGHT) -->
  <rect x="642" y="158" width="244" height="88" rx="8" fill="#eaf4ee" stroke="#2e7d52" stroke-width="1.5"/>
  <text x="764" y="196" text-anchor="middle" font-size="19" font-weight="700" fill="#1e5e3a">H2 Helpful</text>
  <text x="764" y="222" text-anchor="middle" font-size="12" fill="#475467">작업 완수와 실제 도움</text>

  <!-- tension link -->
  <line x1="326" y1="202" x2="634" y2="202" stroke="#475467" stroke-width="1.6" marker-start="url(#ah-tension)" marker-end="url(#ah-tension)"/>
  <rect x="424" y="184" width="112" height="36" rx="6" fill="#ffffff" stroke="#cbd2dd" stroke-width="1"/>
  <text x="480" y="207" text-anchor="middle" font-size="13" font-weight="600" fill="#475467">긴장 · tradeoff</text>

  <!-- H3 Honest (center, mediator) -->
  <rect x="350" y="300" width="260" height="84" rx="8" fill="#eaf1fb" stroke="#2c6cb0" stroke-width="1.5"/>
  <text x="480" y="336" text-anchor="middle" font-size="19" font-weight="700" fill="#1f4e85">H3 Honest</text>
  <text x="480" y="361" text-anchor="middle" font-size="12" fill="#475467">정확한 인식과 불확실성 전달</text>

  <!-- Honest mediates both -->
  <path d="M398 300 C330 276 252 254 210 246" fill="none" stroke="#2c6cb0" stroke-width="1.6" marker-end="url(#ah-mediate)"/>
  <path d="M562 300 C630 276 708 254 750 246" fill="none" stroke="#2c6cb0" stroke-width="1.6" marker-end="url(#ah-mediate)"/>
  <text x="298" y="282" text-anchor="middle" font-size="11" fill="#2c6cb0">중재 mediates</text>
  <text x="662" y="282" text-anchor="middle" font-size="11" fill="#2c6cb0">중재 mediates</text>

  <!-- RC Role Consistency (base, stabilizer) -->
  <rect x="320" y="430" width="320" height="58" rx="8" fill="#f0ecf7" stroke="#6c4aa3" stroke-width="1.5"/>
  <text x="480" y="454" text-anchor="middle" font-size="17" font-weight="700" fill="#4a2d7a">RC Role Consistency</text>
  <text x="480" y="475" text-anchor="middle" font-size="12" fill="#475467">맥락 변화 속에서 3H를 안정화</text>

  <!-- RC -> Honest -->
  <line x1="480" y1="430" x2="480" y2="392" stroke="#6c4aa3" stroke-width="1.6" marker-end="url(#ah-stabilize)"/>
  <!-- RC -> Harmless / Helpful (dashed: stabilize) -->
  <path d="M356 452 C236 430 170 330 188 252" fill="none" stroke="#6c4aa3" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ah-stabilize)"/>
  <path d="M604 452 C724 430 790 330 772 252" fill="none" stroke="#6c4aa3" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ah-stabilize)"/>
  <text x="480" y="412" text-anchor="middle" font-size="11" fill="#6c4aa3">안정화 stabilizes</text>
</svg>
