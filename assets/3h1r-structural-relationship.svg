<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc" font-family="Helvetica, Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <title id="title">3H1R pairwise structural relationship for Physical AI risk taxonomy</title>
  <desc id="desc">A monochrome pairwise map of 3H1R relations. H1 Harmless and H2 Helpful are connected by a bidirectional tradeoff. H3 Honest points to H1 through uncertainty calibration and to H2 through capability calibration. RC Role Consistency sends dashed context-invariant constraint paths to H1, H2, and H3. The multiplier effect of RC failure is described in the legend.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#222"/>
    </marker>
    <marker id="arrow-start" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,4.5 L8,9 z" fill="#222"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#666"/>
    </marker>
    <style>
      .title{font-size:24px;font-weight:700;fill:#111}
      .subtitle{font-size:13px;fill:#555}
      .node{fill:#fff;stroke:#222;stroke-width:1.8}
      .tag{fill:#222}
      .tagText{font-size:11px;font-weight:700;fill:#fff}
      .nodeTitle{font-size:17px;font-weight:700;fill:#111}
      .nodeText{font-size:12.5px;fill:#444}
      .solid{fill:none;stroke:#222;stroke-width:1.8}
      .dashed{fill:none;stroke:#666;stroke-width:1.6;stroke-dasharray:7 6}
      .labelBox{fill:#fff;stroke:#c9c9c9;stroke-width:1}
      .label{font-size:11.5px;fill:#222}
      .legendText{font-size:11.5px;fill:#333}
      .legendSmall{font-size:10.5px;fill:#555}
    </style>
  </defs>

  <rect width="1100" height="720" fill="#fff"/>
  <text x="56" y="58" class="title">3H1R 구조적 관계</text>
  <text x="56" y="84" class="subtitle">Pairwise relation map — tradeoff, calibration, context-invariant constraint</text>
  <line x1="56" y1="104" x2="1044" y2="104" stroke="#e6e6e6"/>

  <!-- H1 Harmless -->
  <rect x="72" y="150" width="300" height="122" rx="8" class="node"/>
  <rect x="198" y="170" width="48" height="22" rx="5" class="tag"/>
  <text x="222" y="185" text-anchor="middle" class="tagText">H1</text>
  <text x="222" y="220" text-anchor="middle" class="nodeTitle">Harmless · 무해성</text>
  <text x="222" y="247" text-anchor="middle" class="nodeText">물리적 위해의 예방·완화</text>

  <!-- H2 Helpful -->
  <rect x="728" y="150" width="300" height="122" rx="8" class="node"/>
  <rect x="854" y="170" width="48" height="22" rx="5" class="tag"/>
  <text x="878" y="185" text-anchor="middle" class="tagText">H2</text>
  <text x="878" y="220" text-anchor="middle" class="nodeTitle">Helpful · 유용성</text>
  <text x="878" y="247" text-anchor="middle" class="nodeText">의도·맥락에 맞는 과업 수행</text>

  <!-- H3 Honest -->
  <rect x="400" y="328" width="300" height="122" rx="8" class="node"/>
  <rect x="526" y="348" width="48" height="22" rx="5" class="tag"/>
  <text x="550" y="363" text-anchor="middle" class="tagText">H3</text>
  <text x="550" y="398" text-anchor="middle" class="nodeTitle">Honest · 정직성</text>
  <text x="550" y="425" text-anchor="middle" class="nodeText">상태 인식·불확실성·능력 표상</text>

  <!-- RC Role Consistency -->
  <rect x="380" y="548" width="340" height="100" rx="8" class="node"/>
  <rect x="526" y="568" width="48" height="22" rx="5" class="tag"/>
  <text x="550" y="583" text-anchor="middle" class="tagText">RC</text>
  <text x="550" y="617" text-anchor="middle" class="nodeTitle">Role Consistency · 역할 일관성</text>
  <text x="550" y="640" text-anchor="middle" class="nodeText">역할·권한·안전 원칙의 맥락 불변 유지</text>

  <!-- H1 <-> H2 tradeoff -->
  <line x1="382" y1="211" x2="718" y2="211" class="solid" marker-start="url(#arrow-start)" marker-end="url(#arrow)"/>
  <rect x="488" y="188" width="124" height="34" rx="6" class="labelBox"/>
  <text x="550" y="209" text-anchor="middle" class="label">긴장 · tradeoff</text>

  <!-- H3 calibration paths -->
  <path d="M454 328 C376 300 310 286 238 274" class="solid" marker-end="url(#arrow)"/>
  <rect x="182" y="304" width="226" height="26" rx="6" fill="#fff"/>
  <text x="295" y="322" text-anchor="middle" class="label">불확실성 보정 · uncertainty calibration</text>

  <path d="M646 328 C724 300 790 286 862 274" class="solid" marker-end="url(#arrow)"/>
  <rect x="706" y="304" width="226" height="26" rx="6" fill="#fff"/>
  <text x="819" y="322" text-anchor="middle" class="label">능력 보정 · capability calibration</text>

  <!-- RC context-invariant constraint paths -->
  <path d="M424 548 C250 512 160 386 190 278" class="dashed" marker-end="url(#arrow-dashed)"/>
  <path d="M676 548 C850 512 940 386 910 278" class="dashed" marker-end="url(#arrow-dashed)"/>
  <path d="M550 548 L550 456" class="dashed" marker-end="url(#arrow-dashed)"/>

  <rect x="58" y="410" width="250" height="28" rx="6" fill="#fff"/>
  <text x="183" y="429" text-anchor="middle" class="label">맥락 불변 제약 · context-invariant constraint</text>
  <rect x="792" y="410" width="250" height="28" rx="6" fill="#fff"/>
  <text x="917" y="429" text-anchor="middle" class="label">맥락 불변 제약 · context-invariant constraint</text>
  <rect x="568" y="492" width="250" height="28" rx="6" fill="#fff"/>
  <text x="693" y="511" text-anchor="middle" class="label">맥락 불변 제약 · context-invariant constraint</text>

  <!-- Legend -->
  <line x1="72" y1="686" x2="122" y2="686" class="solid" marker-end="url(#arrow)"/>
  <text x="134" y="690" class="legendText">실선: H1/H2 tradeoff 및 H3 calibration 관계</text>
  <line x1="430" y1="686" x2="480" y2="686" class="dashed" marker-end="url(#arrow-dashed)"/>
  <text x="492" y="690" class="legendText">점선: RC의 맥락 불변 제약 경로</text>
  <text x="760" y="690" class="legendSmall">RC multiplier: RC 실패는 H1/H2/H3 실패를 동시에 증폭하는 경계 조건</text>
</svg>
